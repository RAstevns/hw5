<html lang="en">

<head>
    <meta charset="UTF-8">

    <!--   Stylesheet   -->

    <!--   Title   -->
    <title>Scrabble</title>

<body>
    <h1> One-line scrabble </h1>
    <p>
        To play a tile, click and drag to the spot on the line where you want to play it.
        If you want to play the one-line version <a href="full-board-ver.html">click here</a>
    </p>
    <div id="one-line-div">
        <img src="images/Scrabble_board_oneline_screenshot.png" id="one-line-img" alt="Failed to load one-line board">

    </div>
    
    <div id="holder-div">

        <img src="images/scrabble-tile-holder-406774_640.png" id="holder-img" alt="Failed to load tile holder">
        
    </div>
    <div>
        <button id="restart">Restart</button>
        <button id="submit-word">Submit Word</button>
        <p > Word point value :<span id="point-value"></span></p>
        <p > Current Word : <span id="current-word"></span></p>
        <p>Word history</p>
        <ol id="word-history">
            
        </ol>
        <p>Total Score: <span id="score-holder"></span></p>
    </div>


</body>
